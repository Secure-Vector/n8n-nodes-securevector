<?xml version="1.0" encoding="UTF-8"?>
<!--
  High-level n8n ↔ SecureVector architecture, v0.2.0.
  Shipped with PR #19 (feat/local-app-support).

  Shows the two transports (cloud + local app) and the three integration
  surfaces a workflow author touches: scanning (prompts/outputs),
  cost tracking, and policy-gated AI-Agent tool calls via the new
  SecureVectorPolicyTool sub-node.

  Rendering target: GitHub README. Keep to a 16:9ish aspect,
  monospace-ish type, and neutral theme colors so it reads in
  both light and dark README views.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 860" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <style>
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; }
      .sv-node { fill: #ecfeff; stroke: #06b6d4; stroke-width: 1.5; }
      .policy-tool { fill: #f0fdf4; stroke: #10b981; stroke-width: 1.5; }
      .llm-node { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.2; }
      .tool-node { fill: #fafafa; stroke: #a1a1aa; stroke-width: 1.2; stroke-dasharray: 3 3; }
      .local-app { fill: #f1f5f9; stroke: #475569; stroke-width: 1.5; }
      .section-label { font-size: 11px; font-weight: 700; fill: #64748b; letter-spacing: 0.8px; text-transform: uppercase; }
      .node-title { font-size: 12.5px; font-weight: 700; fill: #0f172a; }
      .node-sub { font-size: 10.5px; fill: #475569; }
      .arrow-label { font-size: 10px; fill: #475569; font-weight: 600; }
      .branch-allow { stroke: #10b981; }
      .branch-block { stroke: #ef4444; }
      .dashed { stroke-dasharray: 5 4; }
      .divider { stroke: #e2e8f0; stroke-width: 1; }
      .badge { font-size: 9.5px; font-weight: 700; fill: #ffffff; }
      .title { font-size: 17px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 11.5px; fill: #475569; }
    </style>
  </defs>

  <!-- ── TITLE ─────────────────────────────────────────────────────── -->
  <text x="40" y="32" class="title">n8n ↔ SecureVector — v0.2.0 integration surface</text>
  <text x="40" y="52" class="subtitle">Two node classes, two transports (cloud + local app), three surfaces: scan · cost · policy-gated tools. PR #19.</text>

  <!-- ── TRANSPORT BAND ────────────────────────────────────────────── -->
  <text x="40" y="88" class="section-label">Transport (per-node setting)</text>
  <line x1="40" y1="95" x2="1360" y2="95" class="divider"/>

  <!-- Cloud lane label -->
  <rect x="1080" y="108" width="280" height="40" class="node" rx="8"/>
  <text x="1096" y="128" class="node-title">Cloud transport</text>
  <text x="1096" y="142" class="node-sub">scan.securevector.io · X-Api-Key · scan ops only</text>

  <!-- Local lane label -->
  <rect x="40" y="108" width="320" height="40" class="node" rx="8"/>
  <text x="56" y="128" class="node-title">Local App transport</text>
  <text x="56" y="142" class="node-sub">http://127.0.0.1:8741 · no auth · full feature set</text>

  <!-- ── WORKFLOW ROW ──────────────────────────────────────────────── -->
  <text x="40" y="190" class="section-label">Typical LLM workflow (static or AI-Agent driven)</text>
  <line x1="40" y1="197" x2="1360" y2="197" class="divider"/>

  <!-- Trigger -->
  <rect x="40" y="220" width="130" height="64" class="node"/>
  <text x="105" y="248" text-anchor="middle" class="node-title">Trigger</text>
  <text x="105" y="266" text-anchor="middle" class="node-sub">Webhook · Cron</text>
  <text x="105" y="278" text-anchor="middle" class="node-sub">Chat · Form</text>

  <!-- SV scanPrompt -->
  <rect x="200" y="220" width="170" height="64" class="node sv-node"/>
  <text x="285" y="243" text-anchor="middle" class="node-title">SV · Scan Prompt</text>
  <text x="285" y="260" text-anchor="middle" class="node-sub">POST /analyze</text>
  <text x="285" y="274" text-anchor="middle" class="node-sub">cloud + local</text>

  <!-- SV checkBudget -->
  <rect x="400" y="220" width="170" height="64" class="node sv-node"/>
  <text x="485" y="243" text-anchor="middle" class="node-title">SV · Check Budget</text>
  <text x="485" y="260" text-anchor="middle" class="node-sub">GET /api/costs/</text>
  <text x="485" y="274" text-anchor="middle" class="node-sub">budget-status</text>

  <!-- LLM / Agent -->
  <rect x="600" y="220" width="200" height="64" class="node llm-node"/>
  <text x="700" y="243" text-anchor="middle" class="node-title">OpenAI / AI Agent</text>
  <text x="700" y="260" text-anchor="middle" class="node-sub">or LangChain Chat Model</text>
  <text x="700" y="274" text-anchor="middle" class="node-sub">(Simplify Output: OFF)</text>

  <!-- SV scanOutput -->
  <rect x="830" y="220" width="170" height="64" class="node sv-node"/>
  <text x="915" y="243" text-anchor="middle" class="node-title">SV · Scan Output</text>
  <text x="915" y="260" text-anchor="middle" class="node-sub">POST /analyze</text>
  <text x="915" y="274" text-anchor="middle" class="node-sub">llm_response=true</text>

  <!-- SV costs.track -->
  <rect x="1030" y="220" width="170" height="64" class="node sv-node"/>
  <text x="1115" y="243" text-anchor="middle" class="node-title">SV · Track Cost</text>
  <text x="1115" y="260" text-anchor="middle" class="node-sub">POST /api/costs/track</text>
  <text x="1115" y="274" text-anchor="middle" class="node-sub">3 source modes</text>

  <!-- Respond -->
  <rect x="1230" y="220" width="130" height="64" class="node"/>
  <text x="1295" y="248" text-anchor="middle" class="node-title">Respond</text>
  <text x="1295" y="266" text-anchor="middle" class="node-sub">Webhook reply</text>
  <text x="1295" y="278" text-anchor="middle" class="node-sub">Slack · Email · DB</text>

  <!-- Arrows across the happy path -->
  <line x1="170" y1="252" x2="200" y2="252" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="370" y1="252" x2="400" y2="252" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="570" y1="252" x2="600" y2="252" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="800" y1="252" x2="830" y2="252" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="1000" y1="252" x2="1030" y2="252" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="1200" y1="252" x2="1230" y2="252" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Block branches (Fail-style) off scanPrompt and scanOutput -->
  <path d="M 285 284 Q 285 330 360 330" fill="none" class="branch-block" stroke-width="1.4" marker-end="url(#arrow-red)"/>
  <text x="293" y="324" class="arrow-label" fill="#ef4444">BLOCK</text>
  <rect x="365" y="310" width="160" height="40" class="node" rx="8" stroke="#ef4444"/>
  <text x="445" y="326" text-anchor="middle" class="node-title" fill="#991b1b">Fallback / Refuse</text>
  <text x="445" y="340" text-anchor="middle" class="node-sub">+ tools.logCall(block)</text>

  <path d="M 915 284 Q 915 330 840 330" fill="none" class="branch-block" stroke-width="1.4" marker-end="url(#arrow-red)"/>
  <text x="875" y="324" class="arrow-label" fill="#ef4444">BLOCK</text>

  <!-- Budget over → alert -->
  <path d="M 485 284 Q 485 370 560 370" fill="none" class="branch-block" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
  <text x="495" y="364" class="arrow-label" fill="#ef4444">over_budget</text>
  <rect x="565" y="350" width="150" height="40" class="node" rx="8" stroke="#ef4444"/>
  <text x="640" y="366" text-anchor="middle" class="node-title" fill="#991b1b">Stop / Alert</text>
  <text x="640" y="380" text-anchor="middle" class="node-sub">Slack · PagerDuty</text>

  <!-- ── AI AGENT + POLICY TOOL PATTERN ────────────────────────────── -->
  <text x="40" y="430" class="section-label">AI Agent with dynamic tool selection (new SecureVectorPolicyTool sub-node)</text>
  <line x1="40" y1="437" x2="1360" y2="437" class="divider"/>

  <!-- Agent node -->
  <rect x="40" y="460" width="260" height="130" class="node llm-node"/>
  <text x="170" y="484" text-anchor="middle" class="node-title">AI Agent (Tools Agent)</text>
  <text x="170" y="500" text-anchor="middle" class="node-sub">@n8n/nodes-langchain</text>
  <line x1="60" y1="510" x2="280" y2="510" class="divider"/>
  <text x="170" y="528" text-anchor="middle" class="node-sub">◯ Chat Model</text>
  <text x="170" y="544" text-anchor="middle" class="node-sub">◯ Memory</text>
  <text x="170" y="560" text-anchor="middle" class="node-sub">◯ Tool · Tool · Tool …</text>
  <text x="170" y="578" text-anchor="middle" class="node-sub" fill="#065f46">(SecureVectorPolicyTool sub-nodes)</text>

  <!-- Tool binding arrows -->
  <line x1="300" y1="495" x2="360" y2="495" stroke="#64748b" class="dashed" marker-end="url(#arrow)"/>
  <line x1="300" y1="530" x2="360" y2="530" stroke="#64748b" class="dashed" marker-end="url(#arrow)"/>
  <line x1="300" y1="565" x2="360" y2="565" stroke="#64748b" class="dashed" marker-end="url(#arrow)"/>

  <!-- Policy tools attached -->
  <rect x="360" y="470" width="240" height="50" class="node policy-tool"/>
  <text x="480" y="489" text-anchor="middle" class="node-title">SV · PolicyTool</text>
  <text x="480" y="505" text-anchor="middle" class="node-sub">secure_gmail_send → Gmail.send</text>

  <rect x="360" y="505" width="240" height="50" class="node policy-tool" transform="translate(0 0)"/>
  <text x="480" y="524" text-anchor="middle" class="node-title">SV · PolicyTool</text>
  <text x="480" y="540" text-anchor="middle" class="node-sub">secure_http_fetch → HTTP.request</text>

  <rect x="360" y="540" width="240" height="50" class="node policy-tool"/>
  <text x="480" y="559" text-anchor="middle" class="node-title">SV · PolicyTool</text>
  <text x="480" y="575" text-anchor="middle" class="node-sub">secure_slack_post → Slack.send</text>

  <!-- Inside one PolicyTool — decision flow -->
  <rect x="640" y="460" width="400" height="150" class="node" rx="10"/>
  <text x="660" y="482" class="section-label">Inside each PolicyTool (runtime)</text>

  <rect x="660" y="498" width="160" height="36" class="node sv-node"/>
  <text x="740" y="521" text-anchor="middle" class="node-title">checkPermission</text>

  <line x1="820" y1="516" x2="860" y2="516" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Branch: allow vs block -->
  <rect x="860" y="494" width="160" height="40" class="node policy-tool"/>
  <text x="940" y="510" text-anchor="middle" class="node-title" fill="#065f46">allow / log_only</text>
  <text x="940" y="524" text-anchor="middle" class="node-sub">→ executeWorkflow</text>

  <rect x="860" y="540" width="160" height="40" class="node" stroke="#ef4444"/>
  <text x="940" y="556" text-anchor="middle" class="node-title" fill="#991b1b">block</text>
  <text x="940" y="570" text-anchor="middle" class="node-sub">→ return &#123;blocked&#125;</text>

  <line x1="820" y1="516" x2="860" y2="514" class="branch-allow" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="820" y1="516" x2="860" y2="560" class="branch-block" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Unified logCall -->
  <rect x="670" y="560" width="150" height="40" class="node sv-node"/>
  <text x="745" y="576" text-anchor="middle" class="node-title">tools.logCall</text>
  <text x="745" y="590" text-anchor="middle" class="node-sub">append hash-chain row</text>

  <path d="M 940 534 Q 940 550 820 580" fill="none" stroke="#64748b" class="dashed" marker-end="url(#arrow)"/>
  <path d="M 940 580 Q 940 590 820 585" fill="none" stroke="#64748b" class="dashed" marker-end="url(#arrow)"/>

  <!-- Real sub-workflow -->
  <rect x="1080" y="460" width="280" height="150" class="node tool-node"/>
  <text x="1100" y="483" class="section-label">User-supplied sub-workflow</text>
  <text x="1100" y="504" class="node-title">&quot;real Gmail send&quot;</text>
  <rect x="1100" y="514" width="120" height="34" class="node"/>
  <text x="1160" y="535" text-anchor="middle" class="node-sub">Execute Workflow</text>
  <text x="1160" y="547" text-anchor="middle" class="node-sub">Trigger</text>
  <rect x="1100" y="560" width="120" height="34" class="node"/>
  <text x="1160" y="581" text-anchor="middle" class="node-sub">Gmail · Send</text>
  <line x1="1160" y1="548" x2="1160" y2="560" stroke="#64748b" marker-end="url(#arrow)"/>

  <line x1="1020" y1="516" x2="1080" y2="530" stroke="#10b981" class="branch-allow" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="1030" y="515" class="arrow-label" fill="#065f46">allow</text>

  <!-- ── BACKEND LANE (local app) ──────────────────────────────────── -->
  <text x="40" y="660" class="section-label">SecureVector Local App — port 8741 (unauthenticated loopback)</text>
  <line x1="40" y1="667" x2="1360" y2="667" class="divider"/>

  <rect x="40" y="690" width="1320" height="130" class="node local-app"/>

  <!-- Endpoints -->
  <rect x="64" y="710" width="240" height="46" class="node sv-node"/>
  <text x="184" y="729" text-anchor="middle" class="node-title">/analyze</text>
  <text x="184" y="745" text-anchor="middle" class="node-sub">scan prompt · scan output</text>

  <rect x="314" y="710" width="240" height="46" class="node sv-node"/>
  <text x="434" y="729" text-anchor="middle" class="node-title">/api/tool-permissions/*</text>
  <text x="434" y="745" text-anchor="middle" class="node-sub">check · call-audit · integrity</text>

  <rect x="564" y="710" width="240" height="46" class="node sv-node"/>
  <text x="684" y="729" text-anchor="middle" class="node-title">/api/costs/*</text>
  <text x="684" y="745" text-anchor="middle" class="node-sub">track · budget-status · summary</text>

  <rect x="814" y="710" width="240" height="46" class="node sv-node"/>
  <text x="934" y="729" text-anchor="middle" class="node-title">/api/system/device-id</text>
  <text x="934" y="745" text-anchor="middle" class="node-sub">sv-&lt;24 hex&gt; · fleet attribution</text>

  <rect x="1064" y="710" width="272" height="46" class="node sv-node"/>
  <text x="1200" y="729" text-anchor="middle" class="node-title">SIEM forwarder (opt-in)</text>
  <text x="1200" y="745" text-anchor="middle" class="node-sub">Splunk · Datadog · OTLP · webhook</text>

  <!-- State -->
  <rect x="64" y="768" width="620" height="40" class="node"/>
  <text x="80" y="789" class="node-sub">State on-device: tamper-evident hash chain · cost ledger · rule/policy DB · device_id</text>

  <rect x="700" y="768" width="636" height="40" class="node"/>
  <text x="716" y="789" class="node-sub">Privacy: prompts · outputs · matched patterns never leave the machine except via explicit SIEM export (opt-in)</text>

  <!-- Legend -->
  <g transform="translate(40 830)">
    <rect x="0" y="0" width="14" height="14" class="node sv-node"/>
    <text x="22" y="11" font-size="11" fill="#334155">SecureVector node (v0.2.0)</text>
    <rect x="190" y="0" width="14" height="14" class="node policy-tool"/>
    <text x="212" y="11" font-size="11" fill="#334155">SecureVectorPolicyTool (new sub-node)</text>
    <rect x="450" y="0" width="14" height="14" class="node llm-node"/>
    <text x="472" y="11" font-size="11" fill="#334155">LLM / AI Agent</text>
    <rect x="580" y="0" width="14" height="14" class="node tool-node"/>
    <text x="602" y="11" font-size="11" fill="#334155">User sub-workflow / real tool</text>
    <line x1="760" y1="7" x2="790" y2="7" class="branch-allow" stroke-width="1.5"/>
    <text x="795" y="11" font-size="11" fill="#334155">allow / success</text>
    <line x1="900" y1="7" x2="930" y2="7" class="branch-block" stroke-width="1.5"/>
    <text x="935" y="11" font-size="11" fill="#334155">block / fail-branch</text>
  </g>
</svg>
